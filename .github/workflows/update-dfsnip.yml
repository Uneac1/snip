name: Sync dfsnip to Misub

on:
  schedule:
    # 00:10 UTC = 08:10 Asia/Shanghai
    - cron: "10 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Update dfsnip in Misub
        env:
          MISUB_PASSWORD: ${{ secrets.MISUB_PASSWORD }}
        run: node scripts/update-dfsnip.mjs
